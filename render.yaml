databases:
  - name: movierec-db
    databaseName: movierec
    user: movierec

services:
  - type: web
    name: movierec-api
    runtime: python
    plan: free
    buildCommand: pip install -r server/requirements.txt && pip install -r ml/requirements.txt
    startCommand: PYTHONPATH=. uvicorn app.main:app --app-dir server --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MLR_DB_URL
        fromDatabase:
          name: movierec-db
          property: connectionString
      - key: TMDB_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: MLR_DB_INIT
        value: "true"
      - key: INCLUDE_TITLES
        value: "true"
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: AUTH_COOKIE_SAMESITE
        value: "lax"
      - key: CORS_ALLOW_ORIGINS
        sync: false
